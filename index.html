<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配合計算 Ver.7</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  padding: 12px;
  background: #fff;
  font-size: 18px;
}
h1 {
  text-align: center;
  font-size: 26px;
}
.header {
  background: #2d6cdf;
  color: white;
  text-align: center;
  padding: 14px;
  border-radius: 10px;
  font-size: 22px;
  font-weight: bold;
}
.box {
  background: #eaf3ff;
  margin-top: 12px;
  padding: 10px;
  border-radius: 10px;
}
.alert {
  background: #fff3e0;
  border: 2px solid #ff9800;
}
label {
  display: block;
  font-weight: bold;
}
.note {
  color: #cc6600;
  font-size: 14px;
}
select, input, button {
  width: 100%;
  margin-top: 8px;
  padding: 14px;
  font-size: 22px;
  border-radius: 8px;
}
button {
  background: #2d6cdf;
  color: white;
  border: none;
  font-weight: bold;
}
.result {
  background: #f5f5f5;
  margin-top: 18px;
  padding: 15px;
  border-radius: 10px;
}
.step {
  text-align: center;
  margin-bottom: 16px;
}
.value {
  font-size: 36px;
  color: #d00000;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>配合計算</h1>

<div class="header">
硬化剤重量（kg） 配合計算
</div>

<div class="box">
<label>配合比</label>
<select id="ratio"></select>
</div>

<div class="box">
<label>予定主剤重量（kg）</label>
<select id="base"></select>
</div>

<div class="box alert">
<label>実測主剤重量（kg）</label>
<div class="note">予定より多く入った場合のみ入力</div>
<input id="actual" type="number" step="0.01" placeholder="例 2.20">
</div>

<div class="box">
<label>希釈率（％）</label>
<select id="thinner"></select>
</div>

<button onclick="calc()">配合計算</button>

<div id="result" class="result"></div>

<script>
const ratio = document.getElementById("ratio");
const base = document.getElementById("base");
const actual = document.getElementById("actual");
const thinner = document.getElementById("thinner");
const result = document.getElementById("result");

function addOption(select, value, text) {
  const option = document.createElement("option");
  option.value = value;
  option.textContent = text;
  select.appendChild(option);
}

// 配合比
for (let a = 9; a >= 1; a--) {
  addOption(ratio, a + ":" + (10 - a), a + ":" + (10 - a));
}

// 主剤重量
for (let i = 0.5; i <= 20; i += 0.5) {
  addOption(base, i.toFixed(1), i.toFixed(1) + "kg");
}

// 希釈率
for (let i = 0; i <= 20; i++) {
  addOption(thinner, i, i + "%");
}

// 前回値読込
ratio.value = localStorage.getItem("ratio") || "9:1";
base.value = localStorage.getItem("base") || "4.5";
thinner.value = localStorage.getItem("thinner") || "10";
actual.value = localStorage.getItem("actual") || "";

function calc() {

  localStorage.setItem("ratio", ratio.value);
  localStorage.setItem("base", base.value);
  localStorage.setItem("thinner", thinner.value);
  localStorage.setItem("actual", actual.value);

  const main = actual.value !== ""
    ? Number(actual.value)
    : Number(base.value);

  const parts = ratio.value.split(":");
  const hard = main * Number(parts[1]) / Number(parts[0]);
  const mixed = main + hard;
  const thin = mixed * Number(thinner.value) / 100;
  const total = mixed + thin;

  result.innerHTML =
    '<div class="step">主剤（' + ratio.value + '）' +
    '<div class="value">' + main.toFixed(2) + 'kg</div></div>' +

    '<div class="step">硬化剤' +
    '<div class="value">' + hard.toFixed(2) + 'kg</div></div>' +

    '<div class="step">混合後重量' +
    '<div class="value">' + mixed.toFixed(2) + 'kg</div></div>' +

    '<div class="step">希釈剤（' + thinner.value + '％）' +
    '<div class="value">' + thin.toFixed(2) + 'kg</div></div>' +

    '<div class="step">完成重量' +
    '<div class="value">' + total.toFixed(2) + 'kg</div></div>';
}

calc();
</script>

</body>
</html>
